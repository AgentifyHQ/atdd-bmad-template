site_name: atdd-bmad-template — Living Documentation
site_description: BDD feature specifications with test results
site_url: ''
docs_dir: site
site_dir: build

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/test-tube
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - search.highlight
    - search.share
    - toc.integrate

extra_css:
  - stylesheets/living-docs.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

# Auto-generated navigation
nav:
  - Home: index.md
  - Acceptance:
      - User Management:
          - User Login Visual: acceptance/user-management/user-login-visual.md
          - User Login: acceptance/user-management/user-login.md
  - Api:
      - Interrupt Management:
          - Content Validation: api/interrupt-management/content-validation.md
      - User Management:
          - User Crud: api/user-management/user-crud.md
  - Integration:
      - Order Flow:
          - Cross Service Order: integration/order-flow/cross-service-order.md
  - Prompt Eval:
      - Rag:
          - Rag Quality: prompt-eval/rag/rag-quality.md
      - Safety:
          - Safety Guardrails: prompt-eval/safety/safety-guardrails.md
      - Summarization:
          - Summarization Quality: prompt-eval/summarization/summarization-quality.md
  - Tags:
      - "@P0": tags/P0.md
      - "@P1": tags/P1.md
      - "@acceptance": tags/acceptance.md
      - "@api": tags/api.md
      - "@context-precision": tags/context-precision.md
      - "@context-recall": tags/context-recall.md
      - "@deterministic": tags/deterministic.md
      - "@eventual-consistency": tags/eventual-consistency.md
      - "@factual": tags/factual.md
      - "@faithfulness": tags/faithfulness.md
      - "@integration": tags/integration.md
      - "@llm-judge": tags/llm-judge.md
      - "@negative": tags/negative.md
      - "@prompt-eval": tags/prompt-eval.md
      - "@rag": tags/rag.md
      - "@relevancy": tags/relevancy.md
      - "@safety": tags/safety.md
      - "@semantic": tags/semantic.md
      - "@smoke": tags/smoke.md
      - "@visual": tags/visual.md
