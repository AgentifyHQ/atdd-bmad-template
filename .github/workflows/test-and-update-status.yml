name: Test Suite & Story Status

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # manual trigger

# Required for project board updates
permissions:
  issues: write
  contents: read
  repository-projects: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Generate BDD tests
        run: npx bddgen

      - name: Run all tests
        run: npx playwright test
        continue-on-error: true  # Don't fail workflow — we want status updates
        env:
          API_URL: ${{ vars.API_URL || 'http://localhost:3000' }}
          APP_URL: ${{ vars.APP_URL || 'http://localhost:3000' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Update story status from test results
        if: always()
        run: python scripts/update-story-status.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and deploy living docs
        if: github.ref == 'refs/heads/main'
        run: |
          pip install mkdocs-material
          python spec-web/build-living-docs.py
          mkdocs gh-deploy -f spec-web/mkdocs.yml --force

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/playwright/
            reports/cucumber/
            reports/test-results/
